name: Juice Shop CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: Docker Buildx Kur
        uses: docker/setup-buildx-action@v3

      - name: Imagi Olustur (Build)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Sadece test amaçlı build ediyoruz
          tags: juice-shop:latest

      - name: Basari Durumu
        run: echo "Build basariyla tamamlandi!"
