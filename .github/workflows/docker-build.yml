name: Juice Shop Guvenlik Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  guvenlik-ve-build:
    runs-on: ubuntu-latest
    steps:
      # 1. Kodunu GitHub'dan bilgisayara çekiyoruz
      - name: Kodlari Getir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. GITLEAKS: Kodun içinde unutulmuş şifre/anahtar var mı bakar
      - name: Sifre Kontrolü (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. SEMGREP: Kodda güvenlik hatası var mı diye tarar
      - name: Kod Analizi (Semgrep)
        run: |
          python3 -m pip install semgrep
          semgrep --config auto .

      # 4. SYFT: Hangi kütüphaneleri kullandığının listesini çıkarır
      - name: Malzeme Listesi (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: 'spdx-json'
          output-file: 'sbom.spdx.json'

      # 5. DOCKER BUILD: Eğer yukarıdakiler tamamsa paketi oluşturur
      - name: Docker Kurulumu
        uses: docker/setup-buildx-action@v3

      - name: Paketi Olustur (Build)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: juice-shop:latest
